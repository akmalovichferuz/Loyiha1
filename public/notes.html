<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zametkalar - Notes App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <div class="flex h-screen overflow-hidden relative w-full">
        
        <div id="sidebarOverlay" class="fixed inset-0 bg-black/50 z-20 hidden md:hidden transition-opacity" onclick="toggleSidebar()"></div>

        <aside id="sidebar" class="w-64 bg-white shadow-2xl flex flex-col h-full overflow-y-auto fixed inset-y-0 left-0 z-30 transform -translate-x-full md:relative md:translate-x-0 transition-transform duration-300">
            <div class="p-6 flex justify-between items-center border-b md:border-none">
                <h1 class="text-2xl font-bold text-indigo-600"><i class="fa-solid fa-book-open mr-2"></i>Notes App</h1>
                <button onclick="toggleSidebar()" class="md:hidden text-gray-400 hover:text-red-500"><i class="fa-solid fa-xmark text-2xl"></i></button>
            </div>
            
            <nav class="flex-1 px-4 py-4 space-y-2">
                <button onclick="changeState('all')" class="w-full flex items-center p-3 text-gray-700 bg-indigo-50 rounded-lg hover:bg-indigo-100 transition">
                    <i class="fa-solid fa-note-sticky w-6 text-indigo-500"></i> Barcha zametkalar
                </button>
                <button onclick="changeState('archive')" class="w-full flex items-center p-3 text-gray-700 rounded-lg hover:bg-gray-100 transition">
                    <i class="fa-solid fa-box-archive w-6 text-gray-500"></i> Arxivlangan
                </button>
                <button onclick="changeState('trash')" class="w-full flex items-center p-3 text-gray-700 rounded-lg hover:bg-red-50 hover:text-red-600 transition">
                    <i class="fa-solid fa-trash w-6"></i> Savatcha
                </button>
                
                <hr class="my-4 border-gray-200">
                <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Kategoriyalar</p>
                <button onclick="changeCategory('Umumiy')" class="w-full text-left p-2 text-sm text-gray-600 hover:text-indigo-600 transition">📁 Umumiy</button>
                <button onclick="changeCategory('Ish')" class="w-full text-left p-2 text-sm text-gray-600 hover:text-indigo-600 transition">💼 Ish uchun</button>
                <button onclick="changeCategory('Shaxsiy')" class="w-full text-left p-2 text-sm text-gray-600 hover:text-indigo-600 transition">🏠 Shaxsiy</button>

                <hr class="my-4 border-gray-200">
                <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Teglar (Tags)</p>
                <div id="tagsList" class="flex flex-wrap gap-2 px-2 pb-6">
                    </div>
            </nav>

            <div class="p-4 border-t mt-auto">
                <button onclick="logout()" class="flex items-center text-red-500 hover:text-red-700 transition w-full p-2"><i class="fa-solid fa-right-from-bracket mr-2"></i> Tizimdan chiqish</button>
            </div>
        </aside>

        <main class="flex-1 flex flex-col h-screen overflow-y-auto w-full relative">
            
            <header class="bg-white shadow-sm p-3 md:p-4 flex flex-col md:flex-row justify-between items-stretch md:items-center sticky top-0 z-10 gap-3">
                <div class="flex items-center gap-2">
                    <button onclick="toggleSidebar()" class="md:hidden p-2 px-3 text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200 transition"><i class="fa-solid fa-bars"></i></button>
                    
                    <div class="flex items-center bg-gray-100 rounded-lg px-3 py-2 flex-1">
                        <i class="fa-solid fa-search text-gray-400"></i>
                        <input type="text" id="searchInput" placeholder="Qidirish..." class="bg-transparent border-none outline-none ml-2 w-full text-sm">
                    </div>
                    
                    <button onclick="openModal()" class="md:hidden bg-indigo-600 text-white px-4 py-2 rounded-lg shadow hover:bg-indigo-700 font-bold flex-shrink-0 transition">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </div>
                
                <div class="flex items-center gap-2">
                    <select id="sortSelect" onchange="changeSort(this.value)" class="bg-gray-100 border-none outline-none text-sm p-2 rounded-lg text-gray-600 cursor-pointer w-full md:w-auto flex-1">
                        <option value="newest">Yaqinda tahrirlangan (Yangi)</option>
                        <option value="oldest">Eng eskilari</option>
                        <option value="a-z">Alifbo (A-Z)</option>
                        <option value="z-a">Alifbo (Z-A)</option>
                    </select>
                    
                    <button onclick="openModal()" class="hidden md:block bg-indigo-600 text-white px-5 py-2 rounded-lg shadow hover:bg-indigo-700 font-bold flex-shrink-0 transition">
                        <i class="fa-solid fa-plus mr-1"></i> Yangi
                    </button>
                </div>
            </header>

            <div class="p-4 md:p-6">
                <div class="flex flex-wrap gap-2 justify-between items-center mb-6">
                    <h2 id="pageTitle" class="text-xl md:text-2xl font-bold text-gray-700">Barcha zametkalar</h2>
                    <span id="activeTagLabel" class="hidden bg-blue-100 text-blue-800 text-sm font-bold px-3 py-1 rounded-full cursor-pointer" onclick="changeTag('')"></span>
                </div>
                
                <div id="emptyState" class="hidden flex flex-col items-center justify-center text-gray-400 mt-20">
                    <i class="fa-regular fa-folder-open text-6xl mb-4"></i><p>Hech narsa topilmadi...</p>
                </div>

                <div id="notesContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-6"></div>
            </div>
        </main>
    </div>

    <div id="noteModal" class="hidden fixed inset-0 bg-black/60 flex justify-center items-center z-50 p-4 transition-opacity">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-6 md:p-8 relative">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h3 id="modalTitle" class="text-xl md:text-2xl font-bold text-gray-800">Yangi zametka</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-red-500 transition"><i class="fa-solid fa-xmark text-2xl"></i></button>
            </div>
            
            <form id="noteForm" class="space-y-4 md:space-y-5">
                <input type="text" id="noteTitle" placeholder="Sarlavha" class="w-full text-lg font-bold p-3 border rounded-xl bg-gray-50 outline-none focus:border-indigo-500 focus:bg-white transition" required>
                <textarea id="noteContent" rows="4" placeholder="Zametka matni..." class="w-full p-3 border rounded-xl bg-gray-50 outline-none focus:border-indigo-500 focus:bg-white transition"></textarea>
                
                <div>
                    <label class="text-xs text-gray-500 font-bold ml-1">Teglar (vergul bilan ajrating)</label>
                    <input type="text" id="noteTags" placeholder="masalan: muhim, g'oya, hisobot" class="w-full p-3 border rounded-xl text-sm bg-gray-50 outline-none focus:border-indigo-500 focus:bg-white transition">
                </div>

                <div class="flex flex-col sm:flex-row gap-4">
                    <div class="flex-1">
                        <label class="text-xs text-gray-500 font-bold ml-1">Kategoriya</label>
                        <select id="noteCategory" class="w-full p-3 border rounded-xl bg-gray-50 outline-none cursor-pointer"><option value="Umumiy">Umumiy</option><option value="Ish">Ish uchun</option><option value="Shaxsiy">Shaxsiy</option></select>
                    </div>
                    <div class="flex-1">
                        <label class="text-xs text-gray-500 font-bold ml-1">Taymer</label>
                        <input type="datetime-local" id="noteRemind" class="w-full p-3 border rounded-xl bg-gray-50 outline-none text-sm cursor-pointer">
                    </div>
                </div>
                <div class="pt-4 flex justify-end">
                    <button type="submit" class="w-full sm:w-auto bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-indigo-700 shadow-lg transition">Saqlash</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.BackButton.show(); 
        tg.BackButton.onClick(() => {
            window.location.href = '/'; 
        });
        const phone = localStorage.getItem('userPhone');
        if (!phone) window.location.href = '/';
        const headers = { 'Content-Type': 'application/json', 'user-phone': phone };
        
        let currentState = 'all'; 
        let currentCategory = '';
        let currentTag = '';
        let currentSort = 'newest';
        
        let allNotes = [];
        let editingNoteId = null;

        document.addEventListener('DOMContentLoaded', fetchNotes);
        document.getElementById('searchInput').addEventListener('input', (e) => fetchNotes(e.target.value));

        
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
            document.getElementById('sidebarOverlay').classList.toggle('hidden');
        }

        
        function closeSidebarOnMobile() {
            if (window.innerWidth < 768) {
                document.getElementById('sidebar').classList.add('-translate-x-full');
                document.getElementById('sidebarOverlay').classList.add('hidden');
            }
        }

        function changeState(state) { currentState = state; currentCategory = ''; currentTag = ''; updateTitle(); fetchNotes(); closeSidebarOnMobile(); }
        function changeCategory(cat) { currentCategory = cat; currentState = 'all'; currentTag = ''; updateTitle(); fetchNotes(); closeSidebarOnMobile(); }
        function changeSort(sort) { currentSort = sort; fetchNotes(); }
        function changeTag(tag) { 
            currentTag = currentTag === tag ? '' : tag; 
            updateTitle(); 
            fetchNotes(); 
            closeSidebarOnMobile();
        }

        function updateTitle() {
            let t = currentState === 'all' ? 'Barcha zametkalar' : (currentState === 'archive' ? 'Arxivlangan' : 'Savatcha');
            if(currentCategory) t = `📁 ${currentCategory}`;
            document.getElementById('pageTitle').innerText = t;

            const tagLabel = document.getElementById('activeTagLabel');
            if(currentTag) {
                tagLabel.innerHTML = `#${currentTag} <i class="fa-solid fa-xmark ml-1"></i>`;
                tagLabel.classList.remove('hidden');
            } else {
                tagLabel.classList.add('hidden');
            }
        }

        async function fetchNotes(search = '') {
            try {
                let url = `/api/notes?state=${currentState}&sortBy=${currentSort}`;
                if (currentCategory) url += `&category=${currentCategory}`;
                if (currentTag) url += `&tag=${currentTag}`;
                if (search) url += `&search=${search}`;

                const res = await fetch(url, { headers });
                const notes = await res.json();
                
                allNotes = notes;
                renderNotes(notes);
                extractAndRenderTags(notes);
            } catch (error) { console.error("Xatolik:", error); }
        }

        function extractAndRenderTags(notes) {
            if(currentState !== 'all' || currentCategory || currentTag) return; 
            
            const allTags = new Set();
            notes.forEach(n => n.tags.forEach(t => allTags.add(t.toLowerCase().trim())));
            
            const tagsList = document.getElementById('tagsList');
            tagsList.innerHTML = '';
            
            allTags.forEach(tag => {
                tagsList.innerHTML += `<span onclick="changeTag('${tag}')" class="text-xs bg-gray-100 hover:bg-blue-100 text-gray-600 hover:text-blue-800 px-2 py-1.5 rounded-lg cursor-pointer transition border border-gray-200">#${tag}</span>`;
            });
        }

        function renderNotes(notes) {
            const container = document.getElementById('notesContainer');
            const emptyState = document.getElementById('emptyState');
            container.innerHTML = '';
            
            if (notes.length === 0) emptyState.classList.remove('hidden');
            else {
                emptyState.classList.add('hidden');
                notes.forEach(note => {
                    let bgClass = note.isPinned ? 'bg-yellow-50 border-yellow-200' : 'bg-white border-gray-200';
                    let doneIcon = note.isCompleted ? '<span class="text-green-500 text-xs font-bold bg-green-50 px-2 py-1 rounded-md"><i class="fa-solid fa-check-double mr-1"></i>Bajarildi</span>' : '';
                    let tagsHtml = note.tags.map(t => `<span class="text-[10px] bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded font-bold">#${t}</span>`).join(' ');

                    container.innerHTML += `
                        <div class="border ${bgClass} p-5 rounded-2xl shadow-sm hover:shadow-md transition relative group flex flex-col h-full overflow-hidden">
                            ${note.isPinned ? '<div class="absolute top-0 right-0 w-8 h-8 bg-yellow-400 rotate-45 transform translate-x-4 -translate-y-4 shadow-sm"></div><i class="fa-solid fa-thumbtack absolute top-1 right-1 text-white text-xs"></i>' : ''}
                            
                            <div class="flex justify-between items-start mb-3 mt-1">
                                <div class="flex gap-1 flex-wrap"><span class="bg-gray-100 text-gray-500 text-xs px-2 py-1 rounded-md font-bold">${note.category}</span></div>
                                ${doneIcon}
                            </div>
                            
                            <h3 class="font-bold text-lg text-gray-800 mb-1 line-clamp-2">${note.title}</h3>
                            <div class="mb-2">${tagsHtml}</div>
                            <p class="text-sm text-gray-600 flex-1 whitespace-pre-wrap line-clamp-3">${note.content || ''}</p>
                            
                            <div class="mt-4 text-[10px] text-gray-400 border-t pt-3 flex justify-between items-center">
                                <span><i class="fa-regular fa-calendar mr-1"></i>${new Date(note.updatedAt).toLocaleDateString()}</span>
                                ${note.remindAt && !note.isCompleted ? `<span class="text-indigo-500 font-bold bg-indigo-50 px-2 py-1 rounded-md"><i class="fa-regular fa-clock mr-1"></i> Eslatma</span>` : ''}
                            </div>

                            <div class="mt-3 pt-3 border-t flex justify-between text-gray-500 md:opacity-0 group-hover:opacity-100 transition-opacity gap-2">
                                ${currentState === 'all' ? `
                                    <button onclick="editNote('${note._id}')" class="hover:text-green-500 bg-gray-50 hover:bg-green-50 p-2 rounded-lg flex-1 transition" title="Tahrirlash"><i class="fa-solid fa-pen"></i></button>
                                    <button onclick="updateNote('${note._id}', {isPinned: ${!note.isPinned}})" class="hover:text-yellow-500 bg-gray-50 hover:bg-yellow-50 p-2 rounded-lg flex-1 transition" title="Qadash"><i class="fa-solid fa-thumbtack"></i></button>
                                    <button onclick="updateNote('${note._id}', {isArchived: true})" class="hover:text-indigo-500 bg-gray-50 hover:bg-indigo-50 p-2 rounded-lg flex-1 transition" title="Arxivlash"><i class="fa-solid fa-box-archive"></i></button>
                                    <button onclick="duplicateNote('${note._id}')" class="hover:text-blue-500 bg-gray-50 hover:bg-blue-50 p-2 rounded-lg flex-1 transition" title="Nusxalash"><i class="fa-solid fa-copy"></i></button>
                                    <button onclick="updateNote('${note._id}', {isTrashed: true})" class="hover:text-red-500 bg-gray-50 hover:bg-red-50 p-2 rounded-lg flex-1 transition" title="Savatcha"><i class="fa-solid fa-trash"></i></button>
                                ` : ''}
                                ${currentState === 'archive' ? `<button onclick="updateNote('${note._id}', {isArchived: false})" class="hover:text-green-500 w-full bg-gray-50 py-2 rounded-lg"><i class="fa-solid fa-upload mr-1"></i> Arxivdan chiqarish</button>` : ''}
                                ${currentState === 'trash' ? `
                                    <button onclick="updateNote('${note._id}', {isTrashed: false})" class="hover:text-green-500 flex-1 bg-gray-50 hover:bg-green-50 p-2 rounded-lg" title="Tiklash"><i class="fa-solid fa-trash-arrow-up"></i></button>
                                    <button onclick="deleteNoteForever('${note._id}')" class="hover:text-red-600 flex-1 bg-gray-50 hover:bg-red-50 p-2 rounded-lg" title="Butunlay o'chirish"><i class="fa-solid fa-skull"></i></button>
                                ` : ''}
                            </div>
                        </div>
                    `;
                });
            }
        }

        function editNote(id) {
            const note = allNotes.find(n => n._id === id);
            if (!note) return;

            editingNoteId = id; 
            document.getElementById('modalTitle').innerText = "Zametkani tahrirlash";
            
            document.getElementById('noteTitle').value = note.title;
            document.getElementById('noteContent').value = note.content || '';
            document.getElementById('noteCategory').value = note.category;
            document.getElementById('noteTags').value = note.tags.join(', ');
            
            if (note.remindAt) {
                const date = new Date(note.remindAt);
                date.setMinutes(date.getMinutes() - date.getTimezoneOffset());
                document.getElementById('noteRemind').value = date.toISOString().slice(0, 16);
            } else {
                document.getElementById('noteRemind').value = '';
            }

            document.getElementById('noteModal').classList.remove('hidden');
        }

        document.getElementById('noteForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            let tagsInput = document.getElementById('noteTags').value;
            let tagsArray = tagsInput.split(',').map(t => t.trim()).filter(t => t.length > 0);

            const data = {
                title: document.getElementById('noteTitle').value,
                content: document.getElementById('noteContent').value,
                category: document.getElementById('noteCategory').value,
                tags: tagsArray,
                remindAt: document.getElementById('noteRemind').value || null
            };

            if (editingNoteId) {
                await fetch(`/api/notes/${editingNoteId}`, { method: 'PATCH', headers, body: JSON.stringify(data) });
            } else {
                await fetch('/api/notes', { method: 'POST', headers, body: JSON.stringify(data) });
            }

            closeModal();
            fetchNotes();
        });

        async function updateNote(id, changes) { await fetch(`/api/notes/${id}`, { method: 'PATCH', headers, body: JSON.stringify(changes) }); fetchNotes(); }
        async function duplicateNote(id) { await fetch(`/api/notes/${id}/duplicate`, { method: 'POST', headers }); fetchNotes(); }
        async function deleteNoteForever(id) { if(confirm("Butunlay o'chiramizmi?")) { await fetch(`/api/notes/${id}`, { method: 'DELETE', headers }); fetchNotes(); } }

        function openModal() { 
            editingNoteId = null; 
            document.getElementById('modalTitle').innerText = "Yangi zametka";
            document.getElementById('noteForm').reset(); 
            document.getElementById('noteModal').classList.remove('hidden'); 
        }
        function closeModal() { document.getElementById('noteModal').classList.add('hidden'); }
        function logout() { localStorage.removeItem('userPhone'); window.location.href = '/'; }
    </script>
</body>
</html>
